name: Build Widget APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk taesung-widget.apk

      - name: Publish APK as Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: widget-latest
          name: 태성 오늘일정 위젯 APK
          files: taesung-widget.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: taesung-widget-apk
          path: taesung-widget.apk
