name: Build Widget APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Generate launcher icons from logo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick
          OUT=app/src/main/res/mipmap-xxxhdpi
          mkdir -p "$OUT"
          # 적응형 아이콘 전경: 로고를 안전영역(약 62%) 안에 비율유지로 배치, 투명 배경
          convert iconsrc/logo.png -trim +repage -resize 268x268 \
            -background none -gravity center -extent 432x432 "$OUT/ic_launcher_foreground.png"
          # 구형 안드로이드(API24~25)용 정사각 아이콘: 흰 배경에 로고 비율유지
          convert iconsrc/logo.png -trim +repage -resize 340x340 \
            -background white -gravity center -extent 432x432 "$OUT/ic_launcher.png"
          cp "$OUT/ic_launcher.png" "$OUT/ic_launcher_round.png"
          ls -la "$OUT"

      - name: Inject google-services.json (from encrypted secret)
        env:
          GS_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          printf '%s' "$GS_B64" | tr -d '[:space:]' | base64 -d > app/google-services.json
          echo "google-services.json bytes: $(wc -c < app/google-services.json)"

      # 서명은 로컬에서 함(키를 클라우드에 올리지 않음) → 여기선 미서명 release 빌드
      - name: Build unsigned release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload unsigned APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
